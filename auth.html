<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion / Inscription - SOLANGE SHOPPING</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <div style="font-size:3rem;margin-bottom:10px">👗</div>
            <h1>SOLANGE SHOPPING</h1>
            <p>Mode & Élégance · Akwa, Douala</p>
        </div>

        <!-- ONGLETS -->
        <div class="auth-tabs">
            <button class="auth-tab actif" data-tab="connexion" onclick="basculerTab('connexion')">🔑 Connexion</button>
            <button class="auth-tab" data-tab="inscription" onclick="basculerTab('inscription')">✨ Inscription</button>
        </div>

        <!-- FORMULAIRE CONNEXION -->
        <form id="form-connexion" class="auth-form" onsubmit="connexion(event)">
            <div class="form-group">
                <label>📧 Adresse email</label>
                <input type="email" name="email" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label>🔒 Mot de passe</label>
                <input type="password" name="mot_de_passe" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-violet btn-plein" style="margin-top:10px">
                🔑 Se connecter
            </button>
            <p style="text-align:center;margin-top:15px;font-size:.85rem;color:#888">
                Pas encore de compte ?
                <a href="#" onclick="basculerTab('inscription')" style="color:var(--primaire);font-weight:600">S'inscrire</a>
            </p>
            <div style="background:#f0e6ff;border-radius:10px;padding:12px;margin-top:15px;font-size:.8rem;color:#666">
                <strong>Compte test :</strong><br>
                Admin : admin@solange-shopping.cm / admin123<br>
                Client : marie@email.com / client123
            </div>
        </form>

        <!-- FORMULAIRE INSCRIPTION -->
        <form id="form-inscription" class="auth-form" style="display:none" onsubmit="inscription(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>👤 Nom</label>
                    <input type="text" name="nom" placeholder="Dupont" required>
                </div>
                <div class="form-group">
                    <label>👤 Prénom</label>
                    <input type="text" name="prenom" placeholder="Marie" required>
                </div>
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label>📱 Téléphone</label>
                <input type="tel" name="telephone" placeholder="+237 6XX XXX XXX">
            </div>
            <div class="form-group">
                <label>🔒 Mot de passe (min. 6 caractères)</label>
                <input type="password" name="mot_de_passe" placeholder="••••••••" required minlength="6">
            </div>
            <div class="form-group">
                <label>🔒 Confirmer le mot de passe</label>
                <input type="password" name="confirmation" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-violet btn-plein" style="margin-top:10px">
                ✨ Créer mon compte
            </button>
            <p style="text-align:center;margin-top:15px;font-size:.85rem;color:#888">
                Déjà un compte ?
                <a href="#" onclick="basculerTab('connexion')" style="color:var(--primaire);font-weight:600">Se connecter</a>
            </p>
        </form>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
