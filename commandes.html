<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Commandes - SOLANGE SHOPPING</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
    <div class="nav-inner">
        <a href="index.html" class="logo">
            <span style="font-size:2rem">👗</span>
            <div class="logo-text"><h1>SOLANGE SHOPPING</h1><span>Mode & Élégance · Douala</span></div>
        </a>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">🏠 Accueil</a></li>
            <li><a href="produits.html">🛍 Produits</a></li>
            <li><a href="promotions.html">🏷 Promotions</a></li>
            <li><a href="commandes.html" class="actif">📋 Commandes</a></li>
            <li><a href="contact.html">📞 Contact</a></li>
        </ul>
        <div class="nav-actions">
            <div id="zone-user" style="display:flex;align-items:center;gap:10px">
                <a href="auth.html" class="btn btn-sm btn-violet">🔑 Connexion</a>
            </div>
            <a href="panier.html"><button class="btn-panier">🛒 Panier <span class="badge-panier" id="badge-panier" style="display:none">0</span></button></a>
            <button class="menu-mobile" id="menu-toggle">☰</button>
        </div>
    </div>
</nav>

<div style="background:linear-gradient(135deg,var(--primaire),var(--primaire-d));color:white;padding:40px 20px;text-align:center">
    <h1 style="font-size:2.2rem;font-weight:800">📋 Mes Commandes</h1>
    <p style="opacity:.9;margin-top:8px">Suivez l'état de vos commandes</p>
</div>

<section class="section">
    <div class="container" style="max-width:800px">
        <div id="commandes-container">
            <div class="loader"><div class="spinner"></div></div>
        </div>
    </div>
</section>

<footer>
    <div class="footer-bottom" style="padding:20px;text-align:center;background:var(--sombre);color:#666;font-size:.82rem">
        © 2024 SOLANGE SHOPPING · Akwa, Douala, Cameroun
    </div>
</footer>

<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
    await verifierSession();
    if (!utilisateurCourant) {
        document.getElementById('commandes-container').innerHTML = `
            <div class="vide">
                <div class="vide-icone">🔒</div>
                <h3>Connexion requise</h3>
                <p>Veuillez vous connecter pour voir vos commandes.</p>
                <br><a href="auth.html" class="btn btn-violet">🔑 Se connecter</a>
            </div>`;
        return;
    }
    chargerMesCommandes();
});

async function chargerMesCommandes() {
    const data = await apiFetch('panier.php?action=mes_commandes');
    const c = document.getElementById('commandes-container');
    if (!data || data.erreur) { c.innerHTML = 'Erreur.'; return; }
    if (data.length === 0) {
        c.innerHTML = `<div class="vide">
            <div class="vide-icone">📦</div>
            <h3>Aucune commande</h3>
            <p>Vous n'avez pas encore passé de commande.</p>
            <br><a href="produits.html" class="btn btn-violet">🛍 Faire mes achats</a>
        </div>`;
        return;
    }

    const statuts = {
        en_attente:  { label: 'En attente', icone: '⏳' },
        confirmee:   { label: 'Confirmée',  icone: '✅' },
        expediee:    { label: 'Expédiée',   icone: '🚚' },
        livree:      { label: 'Livrée',     icone: '🎉' },
        annulee:     { label: 'Annulée',    icone: '❌' }
    };
    const modes = { momo: 'MTN MOMO', orange_money: 'Orange Money', a_la_boutique: 'En boutique' };

    c.innerHTML = data.map(cmd => {
        const st = statuts[cmd.statut] || { label: cmd.statut, icone: '•' };
        const date = new Date(cmd.date_commande).toLocaleDateString('fr-FR', {
            day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        return `
        <div class="commande-card">
            <div class="commande-header">
                <div>
                    <strong style="font-size:1rem">Commande #${cmd.id}</strong>
                    <p style="font-size:.82rem;color:#888;margin-top:3px">📅 ${date}</p>
                </div>
                <span class="statut-badge statut-${cmd.statut}">${st.icone} ${st.label}</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px">
                <div style="font-size:.88rem">
                    <p><strong>💳 Paiement:</strong> ${modes[cmd.mode_paiement] || cmd.mode_paiement}</p>
                    ${cmd.numero_transaction ? `<p><strong>🔢 N° Transaction:</strong> ${escapeHtml(cmd.numero_transaction)}</p>` : ''}
                    ${cmd.adresse_livraison ? `<p><strong>📍 Livraison:</strong> ${escapeHtml(cmd.adresse_livraison)}</p>` : ''}
                </div>
                <div style="text-align:right">
                    <p style="font-size:1.3rem;font-weight:800;color:var(--primaire)">${formatPrix(cmd.total)}</p>
                </div>
            </div>
            ${cmd.details && cmd.details.length > 0 ? `
            <div style="border-top:1px solid var(--gris);padding-top:12px">
                <p style="font-size:.85rem;font-weight:600;margin-bottom:10px;color:var(--sombre)">Articles commandés :</p>
                ${cmd.details.map(d => `
                    <div style="display:flex;justify-content:space-between;font-size:.85rem;padding:4px 0">
                        <span>🛍 ${escapeHtml(d.produit_nom)} × ${d.quantite}</span>
                        <span style="font-weight:600">${formatPrix(d.prix_unitaire * d.quantite)}</span>
                    </div>
                `).join('')}
            </div>` : ''}
        </div>`;
    }).join('');
}
</script>
</body>
</html>
